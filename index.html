<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <header>
        <a href="index.html" id="logo"> <img src="assets/images/logo-beige.png" alt="Barefeet logo"></a>

        <nav>
            <ul id="menu">
                <li><a href="index.html" class="active">Home</a></li>

        <section id="hero">

                    </tr>
                    <tr>
                        <td>Friday</td>
                        <td>5:00 PM</td>
                        <td>Beginner</td>
                    </tr>
                </tbody>
            </table>

        <section id="events"></section>
        <section id="about" class="light-bg"></section>
        <section id="team"></section>
